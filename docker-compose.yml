services:
  mongodb:
    image: mongo:7
    profiles:
      - docker-mongo
    ports:
      - "${MONGODB_HOST_PORT:-27018}:27017"
    volumes:
      - mongo-data:/data/db

  redis:
    image: redis:7-alpine
    ports:
      - "${REDIS_HOST_PORT:-6380}:6379"

  minio:
    image: minio/minio:RELEASE.2024-07-16T23-46-41Z
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minio
      MINIO_ROOT_PASSWORD: minio123
    ports:
      - "${MINIO_API_HOST_PORT:-9010}:9000"
      - "${MINIO_CONSOLE_HOST_PORT:-9011}:9001"
    volumes:
      - minio-data:/data

volumes:
  mongo-data:
  minio-data:
